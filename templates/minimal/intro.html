<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Intro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1920px; height: 1080px; overflow: hidden; }
    body { background: #000; color: #fff; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .label { font-size: 24px; font-weight: 700; letter-spacing: 4px; color: #00ff88; margin-bottom: 40px; }
    .title { font-size: 160px; font-weight: 900; line-height: 0.95; text-align: center; }
    .title .accent { color: #00ff88; }
    .divider { width: 200px; height: 4px; background: #00ff88; margin: 30px 0 30px; }
    .subtitle { font-size: 36px; font-weight: 300; color: #888; }
  </style>
</head>
<body>
  <div class="label">TECH RADAR</div>
  <div class="title">{{title}}<span class="accent">.</span></div>
  <div class="divider"></div>
  <div class="subtitle">{{subtitle}}</div>
</body>
</html>
