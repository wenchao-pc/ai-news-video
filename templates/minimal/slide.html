<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>{{title}}</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1920px; height: 1080px; overflow: hidden; }
    body { background: #000; color: #fff; font-family: 'Inter', sans-serif; padding: 120px 130px; position: relative; }
    .cat { display: inline-block; font-size: 22px; font-weight: 700; letter-spacing: 4px; color: #00ff88; border: 1px solid #00ff88; padding: 8px 18px; margin-bottom: 110px; }
    .title { font-size: 190px; font-weight: 900; line-height: 0.95; letter-spacing: -4px; margin-bottom: 30px; }
    .title .accent { color: #00ff88; }
    .divider { width: 200px; height: 4px; background: #00ff88; margin-bottom: 50px; }
    .subtitle { font-size: 42px; font-weight: 300; color: #888; margin-bottom: 130px; }
    .highlights { display: flex; flex-direction: column; gap: 28px; font-size: 38px; font-weight: 300; }
    .highlights li { list-style: none; display: flex; align-items: center; gap: 24px; }
    .highlights li::before { content: ""; width: 12px; height: 12px; background: #00ff88; display: inline-block; }
    .footer { position: absolute; bottom: 100px; left: 130px; right: 130px; display: flex; justify-content: space-between; align-items: baseline; font-size: 22px; color: #555; }
    .footer .link { color: #00ff88; }
    .footer .metrics { display: flex; gap: 30px; font-size: 18px; letter-spacing: 1px; }
    .footer .metrics span { color: #888; }
  </style>
</head>
<body>
  <div class="cat">{{category}}</div>
  <div class="title">{{title}}</div>
  <div class="divider"></div>
  <div class="subtitle">{{subtitle}}</div>
  <ul class="highlights">
    <li>{{highlight_1}}</li>
    <li>{{highlight_2}}</li>
    <li>{{highlight_3}}</li>
  </ul>
  <div class="footer">
    <span class="link">⌘ {{link}}</span>
    <div class="metrics">
      <span>{{metrics_label_1}} {{stars}}</span>
      <span>{{metrics_label_2}} {{today}}</span>
      <span>{{language}}</span>
      <span>{{source}}</span>
    </div>
  </div>
</body>
</html>
