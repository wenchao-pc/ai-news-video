<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Outro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1920px; height: 1080px; overflow: hidden; }
    body { background: #000; color: #fff; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .title { font-size: 90px; font-weight: 900; text-align: center; margin-bottom: 30px; }
    .title .accent { color: #00ff88; }
    .subtitle { font-size: 36px; font-weight: 300; color: #888; }
  </style>
</head>
<body>
  <div class="title">{{title}}<span class="accent">.</span></div>
  <div class="subtitle">{{subtitle}}</div>
</body>
</html>
