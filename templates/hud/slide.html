<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>{{title}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1920px; height: 1080px; overflow: hidden; }
    body {
      background: radial-gradient(circle at 30% 20%, #0d1b2a, #0d1117 70%);
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      padding: 60px 80px;
      position: relative;
    }
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: linear-gradient(rgba(34,211,238,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(34,211,238,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
    .top-bar { display: flex; justify-content: space-between; align-items: center; font-family: 'Orbitron', monospace; font-size: 20px; letter-spacing: 2px; color: #22d3ee; margin-bottom: 50px; position: relative; }
    .top-bar::after { content: ""; position: absolute; left: 0; right: 0; bottom: -10px; height: 1px; background: linear-gradient(90deg, #22d3ee, transparent); }
    .live { display: inline-flex; align-items: center; gap: 8px; }
    .live::before { content: ""; width: 8px; height: 8px; background: #22d3ee; border-radius: 50%; box-shadow: 0 0 10px #22d3ee; }
    .layout { display: grid; grid-template-columns: 1.3fr 1fr; gap: 70px; margin-top: 40px; }
    .left .title { font-family: 'Orbitron', monospace; font-size: 100px; font-weight: 900; background: linear-gradient(135deg, #22d3ee, #ec4899); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 24px; line-height: 1.1; }
    .left .subtitle { font-size: 36px; color: #94a3b8; margin-bottom: 50px; }
    .radar { width: 100%; aspect-ratio: 1; max-width: 320px; border-radius: 50%; background: radial-gradient(circle, transparent 30%, rgba(34,211,238,0.08) 31%, transparent 32%), radial-gradient(circle, transparent 50%, rgba(34,211,238,0.08) 51%, transparent 52%), radial-gradient(circle, transparent 75%, rgba(34,211,238,0.08) 76%, transparent 77%), conic-gradient(from 0deg, rgba(34,211,238,0.4), transparent 30%); border: 1px solid rgba(34,211,238,0.5); margin: 20px 0 40px; position: relative; }
    .radar::after { content: "◐ SCANNING"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: 'Orbitron', monospace; font-size: 16px; color: #22d3ee; letter-spacing: 3px; }
    .highlights { list-style: none; }
    .highlights li { font-size: 30px; color: #e2e8f0; padding: 14px 0; border-bottom: 1px solid rgba(34,211,238,0.15); display: flex; align-items: center; gap: 16px; }
    .highlights li::before { content: attr(data-num); font-family: 'Orbitron', monospace; font-weight: 700; color: #ec4899; }
    .right { border-left: 1px solid rgba(34,211,238,0.2); padding-left: 50px; display: flex; flex-direction: column; gap: 36px; }
    .cat-tag { display: inline-block; font-family: 'Orbitron', monospace; font-size: 26px; color: #0d1117; background: #22d3ee; padding: 12px 24px; letter-spacing: 2px; width: fit-content; }
    .stat { font-family: 'Orbitron', monospace; }
    .stat-label { font-size: 18px; color: #64748b; letter-spacing: 3px; margin-bottom: 8px; }
    .stat-value { font-size: 52px; font-weight: 700; color: #22d3ee; }
    .stat-value.accent { color: #ec4899; }
    .footer { position: absolute; bottom: 50px; left: 80px; right: 80px; font-family: 'JetBrains Mono', monospace; font-size: 22px; color: #64748b; display: flex; justify-content: space-between; }
    .footer .src { color: #ec4899; }
  </style>
</head>
<body>
  <div class="top-bar">
    <span>📡 TECH RADAR</span>
    <span><span class="live">LIVE · {{date}}</span></span>
  </div>
  <div class="layout">
    <div class="left">
      <div class="title">{{title}}</div>
      <div class="subtitle">{{subtitle}}</div>
      <div class="radar"></div>
      <ul class="highlights">
        <li data-num="01">{{highlight_1}}</li>
        <li data-num="02">{{highlight_2}}</li>
        <li data-num="03">{{highlight_3}}</li>
      </ul>
    </div>
    <div class="right">
      <div class="cat-tag">{{category}}</div>
      <div class="stat"><div class="stat-label">{{metrics_label_1}}</div><div class="stat-value">{{stars}}</div></div>
      <div class="stat"><div class="stat-label">{{metrics_label_2}}</div><div class="stat-value accent">{{today}}</div></div>
      <div class="stat"><div class="stat-label">{{metrics_label_3}}</div><div class="stat-value">{{language}}</div></div>
      <div class="stat"><div class="stat-label">SOURCE</div><div class="stat-value" style="font-size:28px;">{{source}}</div></div>
    </div>
  </div>
  <div class="footer">
    <span>⌘ {{link}}</span>
    <span class="src">SOURCE :: {{source}}</span>
  </div>
</body>
</html>
