<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Intro</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1920px; height: 1080px; overflow: hidden; }
    body { background: radial-gradient(circle at 50% 50%, #0d1b2a, #0d1117 70%); color: #fff; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
    body::before { content: ""; position: absolute; inset: 0; background-image: linear-gradient(rgba(34,211,238,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(34,211,238,0.04) 1px, transparent 1px); background-size: 40px 40px; }
    .label { font-family: 'Orbitron', monospace; font-size: 24px; color: #22d3ee; letter-spacing: 4px; margin-bottom: 40px; }
    .title { font-family: 'Orbitron', monospace; font-size: 120px; font-weight: 900; background: linear-gradient(135deg, #22d3ee, #ec4899); -webkit-background-clip: text; background-clip: text; color: transparent; text-align: center; line-height: 1.1; }
    .subtitle { font-size: 36px; color: #94a3b8; margin-top: 30px; }
  </style>
</head>
<body>
  <div class="label">📡 TECH RADAR · SYSTEM ONLINE</div>
  <div class="title">{{title}}</div>
  <div class="subtitle">{{subtitle}}</div>
</body>
</html>
