<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Intro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1920px; height: 1080px; overflow: hidden; }
    body {
      background: #0a0a0a;
      color: #00ff88;
      font-family: 'JetBrains Mono', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(0deg, rgba(0,255,136,0.025) 0 1px, transparent 1px 3px);
      pointer-events: none;
    }
    .label {
      font-size: 26px;
      color: #00d4ff;
      margin-bottom: 40px;
      letter-spacing: 4px;
    }
    .title {
      font-size: 120px;
      font-weight: 700;
      color: #00ff88;
      text-shadow: 0 0 40px #00ff8866;
      margin-bottom: 30px;
      text-align: center;
      line-height: 1.1;
    }
    .subtitle {
      font-size: 38px;
      color: #00d4ff;
      margin-top: 20px;
    }
    .blink {
      font-size: 36px;
      color: #00ff88;
      margin-top: 80px;
    }
    .blink::after { content: "█"; animation: blink 1s steps(2) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>
  <div class="label">▶ {{date}} · AI OPEN SOURCE</div>
  <div class="title">{{title}}</div>
  <div class="subtitle">{{subtitle}}</div>
  <div class="blink">$ ready</div>
</body>
</html>
