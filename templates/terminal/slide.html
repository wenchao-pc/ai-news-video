<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>{{title}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1920px; height: 1080px; overflow: hidden; }
    body {
      background: #0a0a0a;
      color: #00ff88;
      font-family: 'JetBrains Mono', monospace;
      padding: 90px 100px;
      position: relative;
    }
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(0deg, rgba(0,255,136,0.025) 0 1px, transparent 1px 3px);
      pointer-events: none;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 36px;
      color: #00d4ff;
      border-bottom: 1px solid #00ff8833;
      padding-bottom: 18px;
      margin-bottom: 50px;
    }
    .cmd {
      font-size: 32px;
      color: #00d4ff88;
      margin-bottom: 30px;
    }
    .title {
      font-size: 110px;
      font-weight: 700;
      color: #00ff88;
      text-shadow: 0 0 30px #00ff8866;
      margin-bottom: 18px;
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .subtitle {
      font-size: 44px;
      color: #00d4ff;
      line-height: 1.4;
      max-height: 2.8em; /* 精确限制2行 = 44 * 1.4 * 2 */
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 45px;
    }
    .metrics {
      display: flex;
      gap: 28px;
      margin-bottom: 50px;
      font-size: 32px;
    }
    .metrics .tag {
      border: 1px solid #00ff8888;
      padding: 10px 22px;
      color: #00ff88;
    }
    .highlights {
      font-size: 40px;
      color: #ffffffcc;
      line-height: 1.5;
      list-style: none;
    }
    .highlights li {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .highlights li::before {
      content: "▶ ";
      color: #00ff88;
      margin-right: 16px;
    }
    .footer {
      position: absolute;
      bottom: 70px;
      left: 100px;
      right: 100px;
      display: block;
      font-size: 36px;
      color: #00d4ffaa;
      border-top: 1px solid #00ff8833;
      padding-top: 22px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>
  <div class="header">
    <span>▶ {{date}}</span>
    <span style="margin-left: auto">{{category}}</span>
  </div>

  <div class="cmd">$ cat {{slug}}.md</div>

  <div class="title">{{title}}</div>
  <div class="subtitle">&gt; {{subtitle}}</div>

  <div class="metrics">
    <span class="tag">{{metrics_label_1}} {{stars}}</span>
    <span class="tag">{{metrics_label_2}} {{today}}</span>
    <span class="tag">{{language}}</span>
  </div>

  <ul class="highlights">
    <li>{{highlight_1}}</li>
    <li>{{highlight_2}}</li>
    <li>{{highlight_3}}</li>
  </ul>

  <div class="footer">
    <span>🔗 {{link}}</span>
  </div>
</body>
</html>
